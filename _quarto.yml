project:
  type: website
  output-dir: _site
  render:
    - "*.qmd"

website:
  title: "Diamond Signal"
  site-url: "https://glederer04.github.io/Baseball-Props/"
  description: "An evidence-first MLB player prop and NRFI model dashboard."
  favicon: assets/mark.svg
  navbar:
    logo: assets/mark.svg
    logo-alt: "Diamond Signal"
    background: "#07111f"
    foreground: "#f5f7fb"
    left:
      - href: index.qmd
        text: Overview
      - href: today.qmd
        text: Model Board
      - href: picks.qmd
        text: My Picks
      - href: performance.qmd
        text: Model Lab
      - href: results.qmd
        text: How It Works
      - href: data-health.qmd
        text: Data Health
    right:
      - icon: github
        href: https://github.com/glederer04/Baseball-Props
        aria-label: GitHub repository
  page-footer:
    left: "Diamond Signal · research, not financial advice"
    right: "Built with R, MLB Stats API, Open-Meteo, and Quarto"

format:
  html:
    theme: [cosmo, styles.scss]
    css: styles.css
    toc: false
    smooth-scroll: true
    page-layout: full
    code-fold: true
    include-after-body: includes/site-footer.html
