name: Daily Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "7 9 * * *"
      timezone: "America/New_York"

concurrency:
  group: daily-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TZ: America/New_York
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4.3"

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake pandoc

      - name: Restore R dependencies
        uses: r-lib/actions/setup-renv@v2
        with:
          cache-version: 2
          bypass-cache: true

      - name: Ensure render packages
        run: |
          Rscript -e "if (!requireNamespace('rmarkdown', quietly = TRUE) || !requireNamespace('knitr', quietly = TRUE)) install.packages(c('rmarkdown', 'knitr'), repos = Sys.getenv('RSPM'))"

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run daily refresh
        run: |
          chmod +x scripts/daily_refresh.sh
          scripts/daily_refresh.sh
