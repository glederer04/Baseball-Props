on:
  workflow_dispatch:
  push:
    branches: main
  workflow_run:
    workflows: ["Daily Refresh"]
    types:
      - completed

name: Publish Site

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref_name || 'main' }}

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.3'

      - name: Restore R dependencies
        uses: r-lib/actions/setup-renv@v2
        with:
          cache-version: 1

      - name: Build today's model-only projection board
        if: github.event_name == 'workflow_dispatch'
        run: Rscript R/run_model_projections.R

      - name: Score today's live card
        if: github.event_name == 'workflow_dispatch'
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: Rscript R/run_daily_predictions.R

      - name: Refresh pick settlement results
        run: Rscript R/update_pick_results.R

      - name: Refresh site status
        run: Rscript R/update_site_status.R

      - name: Render site
        uses: quarto-dev/quarto-actions/render@v2

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
